<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:#121212;
  color:white;
}

/* HEADER */
.header{
  padding:15px;
  text-align:center;
  background:#1c1c1c;
  font-size:20px;
  font-weight:600;
}

/* CONTAINER */
.container{
  padding:15px;
}

/* CARD */
.card{
  background:#1e1e1e;
  border-radius:16px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}

/* TABLE */
.table{
  font-size:18px;
  font-weight:600;
  color:#fc8019;
}

/* TIME */
.time{
  font-size:12px;
  color:#aaa;
  margin-bottom:8px;
}

/* ITEMS */
.item{
  font-size:14px;
  margin:4px 0;
}

/* TOTAL */
.total{
  margin-top:10px;
  font-weight:bold;
}

/* STATUS */
.status{
  display:inline-block;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  margin-top:8px;
}

.pending{background:#ff9800;}
.cooking{background:#2196f3;}
.done{background:#4caf50;}

/* BUTTONS */
.buttons{
  margin-top:10px;
}

button{
  border:none;
  padding:8px 10px;
  border-radius:8px;
  margin:5px 5px 0 0;
  font-size:12px;
}

.cookBtn{background:#2196f3;color:white;}
.doneBtn{background:#4caf50;color:white;}
.deleteBtn{background:#f44336;color:white;}
</style>
</head>

<body>

<div class="header">🍽️ Kitchen Dashboard</div>

<div class="container" id="orders"></div>

<!-- 🔔 SOUND -->
<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAUV8uk7hdxJKh75SlHukoohTtQ1Wd_qLk",
  authDomain: "dhawath-restaurant.firebaseapp.com",
  databaseURL: "https://dhawath-restaurant-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let previousCount = 0;

db.ref("orders").on("value", snapshot => {

  let data = snapshot.val();
  let html = "";

  if(!data){
    document.getElementById("orders").innerHTML = "No orders";
    return;
  }

  let orders = Object.entries(data).reverse();

  // 🔔 Play sound only for new order
  if(orders.length > previousCount){
    document.getElementById("sound").play();
  }
  previousCount = orders.length;

  orders.forEach(([id, order]) => {

    let statusClass = order.status || "pending";

    // ITEMS
    let itemsHTML = "";
    if(order.items){
      for(let key in order.items){
        let item = order.items[key];
        if(item.qty > 0){
          itemsHTML += `<div class="item">${item.name} x ${item.qty}</div>`;
        }
      }
    }

    html += `
    <div class="card">
      <div class="table">Table ${order.table}</div>
      <div class="time">${order.time || ""}</div>

      ${itemsHTML}

      <div class="total">₹${order.total}</div>

      <div class="status ${statusClass}">
        ${order.status}
      </div>

      <div class="buttons">
        <button class="cookBtn" onclick="updateStatus('${id}','cooking')">Cooking</button>
        <button class="doneBtn" onclick="updateStatus('${id}','done')">Done</button>
        <button class="deleteBtn" onclick="deleteOrder('${id}')">Delete</button>
      </div>
    </div>`;
  });

  document.getElementById("orders").innerHTML = html;
});

// UPDATE STATUS
function updateStatus(id, status){
  db.ref("orders/"+id).update({ status });
}

// DELETE ORDER
function deleteOrder(id){
  db.ref("orders/"+id).remove();
}
</script>

</body>
</html>
