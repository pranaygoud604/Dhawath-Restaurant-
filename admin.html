<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dhawath Restaurant Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:#0d0d0d;
  color:white;
}

/* 🔥 SIDEBAR */
.sidebar{
  width:240px;
  background:#161616;
  height:100vh;
  position:fixed;
  padding:20px;
  transition:0.3s;
}

.logo{
  font-size:20px;
  font-weight:600;
  color:#fc8019;
  margin-bottom:30px;
}

.menu a{
  display:block;
  padding:10px;
  margin:10px 0;
  color:#aaa;
  text-decoration:none;
  border-radius:8px;
  transition:0.2s;
}

.menu a:hover{
  background:#fc8019;
  color:white;
}

/* 🔥 MAIN */
.main{
  margin-left:240px;
}

/* 🔥 TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#161616;
  border-bottom:1px solid #222;
}

.title{
  font-weight:600;
  color:#fc8019;
}

.logoutBtn{
  background:#ff3b3b;
  padding:8px 16px;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

.logoutBtn:hover{
  background:#ff1f1f;
}

/* 🔥 STATS */
.stats{
  display:flex;
  gap:15px;
  padding:20px;
}

.stat{
  flex:1;
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.stat h3{
  color:#aaa;
  font-size:14px;
}

.stat p{
  font-size:22px;
  color:#fc8019;
  font-weight:bold;
}

/* 🔥 SECTION */
.section{
  padding:10px 20px;
  color:#fc8019;
}

/* 🔥 CARDS */
.container{
  padding:20px;
}

.card{
  background:#1a1a1a;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.table{
  color:#fc8019;
  font-weight:600;
}

.item{
  font-size:13px;
}

.buttons{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.buttons button{
  flex:1;
}

button{
  padding:8px;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

.cookBtn{background:#2196f3;}
.doneBtn{background:#4caf50;}
.payBtn{background:#ff9800;}
.deleteBtn{background:#f44336;}

/* 📱 MOBILE */
@media(max-width:768px){

.sidebar{
  transform:translateX(-100%);
  position:absolute;
}

.sidebar.active{
  transform:translateX(0);
}

.main{
  margin-left:0;
}

.menuToggle{
  display:block;
  cursor:pointer;
}

.stats{
  flex-direction:column;
}

}

.menuToggle{
  display:none;
  font-size:18px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="logo">🍽️ Dhawath</div>
  <div class="menu">
    <a href="#">Dashboard</a>
    <a href="#" onclick="openReports()">Reports</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <div class="menuToggle" onclick="toggleMenu()">☰</div>
  <div class="title">Admin Dashboard</div>
  <button class="logoutBtn" onclick="logout()">Logout</button>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat">
    <h3>Orders</h3>
    <p id="totalOrders">0</p>
  </div>
  <div class="stat">
    <h3>Revenue</h3>
    <p id="revenue">₹0</p>
  </div>
  <div class="stat">
    <h3>Pending</h3>
    <p id="pending">₹0</p>
  </div>
</div>

<div class="section">💰 Pending Payments</div>
<div class="container" id="payments"></div>

<div class="section">🔥 Live Orders</div>
<div class="container" id="orders"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAUV8uk7hdxJKh75SlHukoohTtQ1Wd_qLk",
    authDomain: "dhawath-restaurant.firebaseapp.com",
    databaseURL: "https://dhawath-restaurant-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();

/* 🔐 AUTH */
auth.onAuthStateChanged(user=>{
  if(!user) location.href="login.html";
});

function logout(){
  auth.signOut().then(()=>location.href="login.html");
}

/* 🔥 DATA */
db.ref("orders").on("value", snap=>{
  let data=snap.val();
  if(!data) return;

  let orders=Object.entries(data).reverse();

  let total=0, revenue=0, pending=0;
  let orderHTML="", paymentHTML="";

  orders.forEach(([id,o])=>{
    total++;

    if(o.payment==="paid") revenue+=o.total||0;
    else pending+=o.total||0;

    let items="";
    for(let k in o.items){
      let it=o.items[k];
      if(it.qty>0) items+=`<div class="item">${it.name} x ${it.qty}</div>`;
    }

    if(o.status!=="done"){
      orderHTML+=`
      <div class="card">
        <div class="table">Table ${o.table}</div>
        ${items}
        <div>₹${o.total}</div>
        <div class="buttons">
          <button class="cookBtn" onclick="updateStatus('${id}','cooking')">Cooking</button>
          <button class="doneBtn" onclick="updateStatus('${id}','done')">Done</button>
          <button class="deleteBtn" onclick="deleteOrder('${id}')">Delete</button>
        </div>
      </div>`;
    }

    if(o.status==="done" && o.payment!=="paid"){
      paymentHTML+=`
      <div class="card">
        <div class="table">Table ${o.table}</div>
        ${items}
        <div>₹${o.total}</div>
        <button class="payBtn" onclick="markPaid('${id}')">Mark Paid</button>
      </div>`;
    }
  });

  document.getElementById("orders").innerHTML=orderHTML || "No active orders";
  document.getElementById("payments").innerHTML=paymentHTML || "No pending";

  document.getElementById("totalOrders").innerText=total;
  document.getElementById("revenue").innerText="₹"+revenue;
  document.getElementById("pending").innerText="₹"+pending;
});

/* FUNCTIONS */
function updateStatus(id,s){
  db.ref("orders/"+id).update({status:s});
}

function markPaid(id){
  db.ref("orders/"+id).update({payment:"paid"});
}

function deleteOrder(id){
  db.ref("orders/"+id).remove();
}

function openReports(){
  location.href="reports.html";
}

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}
</script>

</body>
</html>
