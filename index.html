<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhawath Restaurant</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
.header {
  padding: 20px;
  text-align: center;
}

.subtitle {
  color: orange;
  font-size: 12px;
}

/* INPUT */
input {
  width: 90%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

/* LIST STYLE */
.menu {
  padding: 15px;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1a1a1a;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 12px;
}

.item h3 {
  margin: 0;
}

.price {
  color: orange;
  font-size: 14px;
}

/* BUTTONS */
.controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

.controls button {
  background: orange;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  font-weight: bold;
}

/* FLOATING CART */
.cart-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1a1a1a;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
}

.cart-bar button {
  background: orange;
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
<h2>Dhawath Restaurant</h2>
<div class="subtitle">SCAN • ORDER • PAY</div>
<input type="number" id="table" placeholder="Enter Table Number">
</div>

<div class="menu">

<div class="item">
<div>
<h3>🍗 Chicken Biryani</h3>
<div class="price">₹180</div>
</div>
<div class="controls">
<button onclick="changeQty('biryani',-1)">-</button>
<span id="qty-biryani">0</span>
<button onclick="changeQty('biryani',1)">+</button>
</div>
</div>

<div class="item">
<div>
<h3>🍖 Mutton Biryani</h3>
<div class="price">₹250</div>
</div>
<div class="controls">
<button onclick="changeQty('mutton',-1)">-</button>
<span id="qty-mutton">0</span>
<button onclick="changeQty('mutton',1)">+</button>
</div>
</div>

<div class="item">
<div>
<h3>🍜 Noodles</h3>
<div class="price">₹120</div>
</div>
<div class="controls">
<button onclick="changeQty('noodles',-1)">-</button>
<span id="qty-noodles">0</span>
<button onclick="changeQty('noodles',1)">+</button>
</div>
</div>

<div class="item">
<div>
<h3>🍔 Burger</h3>
<div class="price">₹100</div>
</div>
<div class="controls">
<button onclick="changeQty('burger',-1)">-</button>
<span id="qty-burger">0</span>
<button onclick="changeQty('burger',1)">+</button>
</div>
</div>

<div class="item">
<div>
<h3>🍚 Fried Rice</h3>
<div class="price">₹140</div>
</div>
<div class="controls">
<button onclick="changeQty('rice',-1)">-</button>
<span id="qty-rice">0</span>
<button onclick="changeQty('rice',1)">+</button>
</div>
</div>

<div class="item">
<div>
<h3>🥙 Shawarma</h3>
<div class="price">₹130</div>
</div>
<div class="controls">
<button onclick="changeQty('shawarma',-1)">-</button>
<span id="qty-shawarma">0</span>
<button onclick="changeQty('shawarma',1)">+</button>
</div>
</div>

</div>

<!-- FLOATING CART -->
<div class="cart-bar">
<div>
Total: ₹<span id="total">0</span>
</div>
<button onclick="sendWhatsApp()">Place Order</button>
</div>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="script.js"></script>

</body>
</html>
