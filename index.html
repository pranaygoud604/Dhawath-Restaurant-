<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhawath Restaurant</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: #111;
  color: white;
}

/* CONTAINER */
.overlay {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

/* HEADER */
h1 {
  font-size: 22px;
  font-weight: 600;
}

.subtitle {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 15px;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin: 10px 0 20px;
  font-size: 14px;
}

/* LIST STYLE */
.grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ITEM CARD */
.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1c1c1c;
  border-radius: 12px;
  padding: 12px;
}

/* LEFT */
.item-info {
  text-align: left;
}

.item h3 {
  font-size: 15px;
}

.price {
  font-size: 13px;
  color: #bbb;
}

/* RIGHT BUTTONS */
.qty-box {
  display: flex;
  align-items: center;
  gap: 8px;
}

.qty-box button {
  background: white;
  color: #28a745;
  border: 1px solid #28a745;
  font-weight: bold;
  border-radius: 6px;
  padding: 4px 10px;
}

.qty-box span {
  min-width: 20px;
  text-align: center;
}

/* ORDER */
#orderList {
  margin-top: 15px;
  font-size: 13px;
  color: #ccc;
  text-align: left;
}

.total {
  margin-top: 10px;
  font-size: 18px;
  font-weight: bold;
}

/* ACTION BAR */
.actions {
  position: sticky;
  bottom: 0;
  background: #111;
  padding: 10px 0;
}

.actions button {
  width: 100%;
  background: #fc8019;
  border: none;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: bold;
  color: white;
}

.actions button:last-child {
  background: #444;
}
</style>
</head>

<body>

<div class="overlay">

<h1>Dhawath Restaurant</h1>
<div class="subtitle">SCAN • ORDER • PAY</div>

<input type="number" id="table" placeholder="Enter Table Number">

<div class="grid">

<!-- ITEM 1 -->
<div class="item">
  <div class="item-info">
    <h3>🍜 Noodles</h3>
    <div class="price">₹120</div>
  </div>
  <div class="qty-box">
    <button onclick="changeQty('noodles',-1)">-</button>
    <span id="qty-noodles">0</span>
    <button onclick="changeQty('noodles',1)">+</button>
  </div>
</div>

<!-- ITEM 2 -->
<div class="item">
  <div class="item-info">
    <h3>🍔 Burger</h3>
    <div class="price">₹100</div>
  </div>
  <div class="qty-box">
    <button onclick="changeQty('burger',-1)">-</button>
    <span id="qty-burger">0</span>
    <button onclick="changeQty('burger',1)">+</button>
  </div>
</div>

<!-- ITEM 3 -->
<div class="item">
  <div class="item-info">
    <h3>🥙 Shawarma</h3>
    <div class="price">₹130</div>
  </div>
  <div class="qty-box">
    <button onclick="changeQty('shawarma',-1)">-</button>
    <span id="qty-shawarma">0</span>
    <button onclick="changeQty('shawarma',1)">+</button>
  </div>
</div>

<!-- ITEM 4 -->
<div class="item">
  <div class="item-info">
    <h3>🍗 Tandoori Chicken</h3>
    <div class="price">₹220</div>
  </div>
  <div class="qty-box">
    <button onclick="changeQty('tandoori',-1)">-</button>
    <span id="qty-tandoori">0</span>
    <button onclick="changeQty('tandoori',1)">+</button>
  </div>
</div>

<!-- ITEM 5 -->
<div class="item">
  <div class="item-info">
    <h3>🧀 Paneer Tikka</h3>
    <div class="price">₹160</div>
  </div>
  <div class="qty-box">
    <button onclick="changeQty('paneer',-1)">-</button>
    <span id="qty-paneer">0</span>
    <button onclick="changeQty('paneer',1)">+</button>
  </div>
</div>

<!-- ITEM 6 -->
<div class="item">
  <div class="item-info">
    <h3>🥤 Cool Drinks</h3>
    <div class="price">₹40</div>
  </div>
  <div class="qty-box">
    <button onclick="changeQty('drinks',-1)">-</button>
    <span id="qty-drinks">0</span>
    <button onclick="changeQty('drinks',1)">+</button>
  </div>
</div>

</div>

<h3>Your Order</h3>
<div id="orderList">No items selected</div>

<div class="total">
Total: ₹<span id="total">0</span>
</div>

<div class="actions">
<button onclick="payUPI()">💳 Pay</button>
<button onclick="sendWhatsApp()">📱 Order</button>
<button onclick="clearCart()">🧹 Clear</button>
</div>

</div>

<!-- ✅ Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- Your JS -->
<script src="script.js"></script>

</body>
</html>
