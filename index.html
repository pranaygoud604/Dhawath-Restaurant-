<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dhawath Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins';background:#0f0f0f;color:white;margin:0;padding-bottom:100px}

/* HEADER */
.header{text-align:center;padding:15px}
.header h1{color:#fc8019}

/* SEARCH */
.search{
  width:90%;
  margin:10px auto;
  display:block;
  padding:10px;
  border-radius:8px;
  border:none;
}

/* CATEGORY */
.category{padding:10px;color:#fc8019}

/* MENU */
.menu{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#1c1c1c;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.icon{font-size:26px}
.price{color:#fc8019}

/* QTY */
.qty{display:flex;justify-content:center;gap:10px;margin-top:5px}
.qty button{
  background:#fc8019;border:none;color:white;
  border-radius:5px;width:28px;height:28px;
}

/* 🛒 MINI CART */
.cartBar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fc8019;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}

.cartBar span{font-weight:bold}

/* 📦 FULL CART */
.cartPopup{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  height:70%;
  background:#1c1c1c;
  border-radius:20px 20px 0 0;
  transition:0.3s;
  display:flex;
  flex-direction:column;
}

.cartPopup.active{bottom:0}

.cartHeader{
  padding:15px;
  text-align:center;
  font-weight:bold;
  border-bottom:1px solid #333;
}

.cartItems{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.cartItem{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.cartFooter{
  padding:10px;
  border-top:1px solid #333;
}

.placeBtn{
  width:100%;
  padding:10px;
  background:#fc8019;
  border:none;
  border-radius:8px;
  color:white;
}
</style>
</head>

<body>

<div class="header">
  <h1>🍽️ Dhawath Restaurant</h1>
</div>

<input id="search" class="search" placeholder="Search..." onkeyup="renderMenu()">
<input id="table" class="search" placeholder="Enter Table Number">

<div id="menu"></div>

<!-- 🛒 MINI CART -->
<div class="cartBar" onclick="toggleCart()">
  <span id="cartCount">0 items</span>
  <span id="cartTotal">₹0</span>
</div>

<!-- 📦 FULL CART -->
<div class="cartPopup" id="cartPopup">
  <div class="cartHeader">Your Cart</div>

  <div class="cartItems" id="cartItems"></div>

  <div class="cartFooter">
    <div id="finalTotal">Total ₹0</div>
    <button class="placeBtn" onclick="placeOrder()">Place Order</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig={
  apiKey: "AIzaSyAUV8uk7hdxJKh75SlHukoohTtQ1Wd_qLk",
    authDomain: "dhawath-restaurant.firebaseapp.com",
    databaseURL: "https://dhawath-restaurant-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* MENU */
const items=[
{name:"Chicken Biryani Single",price:140,cat:"Biryani",icon:"🍗"},
{name:"Chicken Biryani Double",price:220,cat:"Biryani",icon:"🍗"},
{name:"Egg Biryani",price:80,cat:"Biryani",icon:"🥚"},
{name:"Chicken Rice",price:90,cat:"Rice",icon:"🍛"},
{name:"Egg Rice",price:70,cat:"Rice",icon:"🍛"},
{name:"Chicken Noodles",price:90,cat:"Noodles",icon:"🍜"},
{name:"Chicken Manchuria",price:150,cat:"Starters",icon:"🍲"},
{name:"Chicken Curry",price:150,cat:"Curries",icon:"🍛"},
{name:"Paneer Curry",price:160,cat:"Curries",icon:"🧀"},
{name:"Chapathi",price:10,cat:"Others",icon:"🫓"},
{name:"Fish Fry",price:120,cat:"Others",icon:"🐟"}
];

let cart={};

/* RENDER MENU */
function renderMenu(){
  let search=document.getElementById("search").value.toLowerCase();
  let html="";

  items.filter(i=>i.name.toLowerCase().includes(search))
  .forEach((item,i)=>{

    html+=`
    <div class="card">
      <div class="icon">${item.icon}</div>
      <div>${item.name}</div>
      <div class="price">₹${item.price}</div>

      <div class="qty">
        <button onclick="changeQty(${i},-1)">-</button>
        <span>${cart[i]?.qty||0}</span>
        <button onclick="changeQty(${i},1)">+</button>
      </div>
    </div>`;
  });

  document.getElementById("menu").innerHTML=html;
}

/* QTY */
function changeQty(i,val){
  if(!cart[i]) cart[i]={...items[i],qty:0};
  cart[i].qty+=val;

  if(cart[i].qty<=0) delete cart[i];

  renderMenu();
  updateCart();
}

/* UPDATE CART */
function updateCart(){
  let total=0,count=0,html="";

  Object.values(cart).forEach((item,i)=>{
    total+=item.qty*item.price;
    count+=item.qty;

    html+=`
    <div class="cartItem">
      <span>${item.name} x ${item.qty}</span>
      <span>₹${item.qty*item.price}</span>
    </div>`;
  });

  document.getElementById("cartItems").innerHTML=html||"Cart empty";
  document.getElementById("cartTotal").innerText="₹"+total;
  document.getElementById("cartCount").innerText=count+" items";
  document.getElementById("finalTotal").innerText="Total ₹"+total;
}

/* TOGGLE CART */
function toggleCart(){
  document.getElementById("cartPopup").classList.toggle("active");
}

/* ORDER */
function placeOrder(){
  let table=document.getElementById("table").value;
  if(!table) return alert("Enter table");

  let total=0;
  Object.values(cart).forEach(i=>total+=i.qty*i.price);

  db.ref("orders").push({
    table,items:cart,total,
    status:"pending",payment:"unpaid",
    time:new Date().toLocaleString()
  });

  alert("Order placed!");
  cart={};
  updateCart();
  renderMenu();
  toggleCart();
}

renderMenu();
</script>

</body>
</html>
