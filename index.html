<body>

<div class="header">🍽️ Dhawath Restaurant</div>

<div class="search">
  <input id="search" placeholder="Search food..." onkeyup="searchItems()">
</div>

<!-- CATEGORY TABS -->
<div class="tabs" id="tabs"></div>

<!-- MENU -->
<div id="menu"></div>

<!-- FOOTER -->
<div class="footer">
  <div id="total">₹0</div>
  <button onclick="placeOrder()">Place Order</button>
</div>

<script>
const items = [
{ name:"Chicken Biryani Single", price:140, cat:"Biryani", img:"biryani"},
{ name:"Chicken Biryani Double", price:220, cat:"Biryani", img:"biryani"},
{ name:"Chicken Biryani Family", price:520, cat:"Biryani", img:"biryani"},
{ name:"Egg Biryani", price:80, cat:"Biryani", img:"egg rice"},

{ name:"Chicken Rice", price:90, cat:"Rice", img:"fried rice"},
{ name:"Egg Rice", price:70, cat:"Rice", img:"egg rice"},
{ name:"Veg Rice", price:60, cat:"Rice", img:"veg rice"},

{ name:"Chicken Noodles", price:90, cat:"Noodles", img:"noodles"},
{ name:"Egg Noodles", price:70, cat:"Noodles", img:"noodles"},

{ name:"Chicken 65", price:160, cat:"Starters", img:"chicken 65"},
{ name:"Chicken Lollipop", price:150, cat:"Starters", img:"lollipop"},

{ name:"Paneer Masala", price:180, cat:"Curries", img:"paneer"},
{ name:"Paneer Curry", price:160, cat:"Curries", img:"paneer"},

{ name:"Chapathi", price:10, cat:"Breads", img:"chapati"}
];

let cart = {};
let currentCategory = "All";

/* CATEGORY BUILD */
function renderTabs() {
  const cats = ["All", ...new Set(items.map(i => i.cat))];
  document.getElementById("tabs").innerHTML = cats.map(c => 
    `<div class="tab ${c===currentCategory?'active':''}" onclick="filterCategory('${c}')">${c}</div>`
  ).join("");
}

/* FILTER */
function filterCategory(cat) {
  currentCategory = cat;
  renderTabs();
  renderMenu();
}

/* MENU */
function renderMenu() {
  let html = '<div class="grid">';
  items
  .filter(i => currentCategory==="All" || i.cat===currentCategory)
  .forEach(i => {
    let id = i.name.replace(/\s/g,'');

    html += `
    <div class="card">
      <img src="https://source.unsplash.com/400x300/?${i.img}">
      <div class="content">
        <div class="title">${i.name}</div>
        <div class="price">₹${i.price}</div>

        <div class="qty">
          <button onclick="updateQty('${i.name}',${i.price},-1)">-</button>
          <span id="${id}">0</span>
          <button onclick="updateQty('${i.name}',${i.price},1)">+</button>
        </div>
      </div>
    </div>`;
  });

  html += "</div>";
  document.getElementById("menu").innerHTML = html;
}

/* CART */
function updateQty(name, price, change) {
  let id = name.replace(/\s/g,'');

  if (!cart[name]) cart[name] = { qty:0, price };
  cart[name].qty += change;

  if (cart[name].qty <= 0) delete cart[name];

  document.getElementById(id).innerText = cart[name]?.qty || 0;
  renderTotal();
}

function renderTotal() {
  let total = 0;
  Object.values(cart).forEach(i => total += i.qty*i.price);
  document.getElementById("total").innerText = "₹"+total;
}

/* SEARCH */
function searchItems() {
  let input = document.getElementById("search").value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(input) ? "block":"none";
  });

/* ORDER */
function placeOrder() {
  alert("Order placed!");
}
// 🔥 PLACE ORDER WITH FIREBASE
function placeOrder() {
  let table = prompt("Enter Table Number");
  if (!table) return alert("Enter table number");
  if (Object.keys(cart).length === 0) return alert("Cart empty");

  db.collection("orders").add({
    table: table,
    items: cart,
    total: document.getElementById("total").innerText,
    status: "new",
    time: new Date()
  })
  .then(() => {
    alert("✅ Order placed!");
    cart = {};
    renderTotal();
    document.querySelectorAll("span").forEach(s => s.innerText = "0");
  })
  .catch(err => {
    alert("Error!");
    console.error(err);
  });
}

renderMenu();
</script>
