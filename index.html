<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhawath Restaurant</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
  background: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092') no-repeat center/cover;
}

.overlay {
  background: rgba(0,0,0,0.85);
  min-height: 100vh;
  padding: 20px;
}

input {
  width: 80%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.item {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 12px;
}

.qty-box button {
  background: #f4b400;
  border: none;
  padding: 6px 10px;
  margin: 5px;
  border-radius: 5px;
}

.actions button {
  background: #f4b400;
  border: none;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="overlay">

<h1>Dhawath Restaurant</h1>
<p>SCAN • ORDER • PAY</p>

<input type="number" id="table" placeholder="Enter Table Number">

<div class="grid">

<!-- ITEMS -->
<div class="item">
<h3>Noodles</h3>
<p>₹120</p>
<div class="qty-box">
<button onclick="changeQty('noodles',-1)">-</button>
<span id="qty-noodles">0</span>
<button onclick="changeQty('noodles',1)">+</button>
</div>
</div>

<div class="item">
<h3>Burger</h3>
<p>₹100</p>
<div class="qty-box">
<button onclick="changeQty('burger',-1)">-</button>
<span id="qty-burger">0</span>
<button onclick="changeQty('burger',1)">+</button>
</div>
</div>

<div class="item">
<h3>Shawarma</h3>
<p>₹130</p>
<div class="qty-box">
<button onclick="changeQty('shawarma',-1)">-</button>
<span id="qty-shawarma">0</span>
<button onclick="changeQty('shawarma',1)">+</button>
</div>
</div>

<div class="item">
<h3>Tandoori</h3>
<p>₹220</p>
<div class="qty-box">
<button onclick="changeQty('tandoori',-1)">-</button>
<span id="qty-tandoori">0</span>
<button onclick="changeQty('tandoori',1)">+</button>
</div>
</div>

<div class="item">
<h3>Paneer</h3>
<p>₹160</p>
<div class="qty-box">
<button onclick="changeQty('paneer',-1)">-</button>
<span id="qty-paneer">0</span>
<button onclick="changeQty('paneer',1)">+</button>
</div>
</div>

<div class="item">
<h3>Drinks</h3>
<p>₹40</p>
<div class="qty-box">
<button onclick="changeQty('drinks',-1)">-</button>
<span id="qty-drinks">0</span>
<button onclick="changeQty('drinks',1)">+</button>
</div>
</div>

</div> <!-- ✅ GRID CLOSED -->

<h3>Your Order</h3>
<div id="orderList">No items selected</div>

<h2>Total: ₹<span id="total">0</span></h2>

<div class="actions">
<button onclick="payUPI()">💳 Pay</button>
<button onclick="sendWhatsApp()">📱 Order</button>
<button onclick="clearCart()">🧹 Clear</button>
</div>

</div>

<!-- ✅ VERY IMPORTANT: USE FIREBASE v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- Your JS -->
<script src="script.js"></script>

</body>
</html>
