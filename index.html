<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dhawath Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
}

.header h1{
  color:#fc8019;
}

/* TABLE */
.tableInput{
  width:90%;
  margin:10px auto;
  display:block;
  padding:12px;
  border-radius:10px;
  border:none;
}

/* MENU */
.menu{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

.icon{
  font-size:28px;
}

.price{
  color:#fc8019;
  margin:5px 0;
}

/* QTY BUTTONS */
.qty{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.qty button{
  width:30px;
  height:30px;
  border:none;
  border-radius:6px;
  background:#fc8019;
  color:white;
  font-weight:bold;
}

/* CART */
.cartBox{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1c1c1c;
  padding:15px;
  border-top:1px solid #333;
}

.cartItem{
  font-size:12px;
}

.total{
  margin-top:8px;
  font-weight:bold;
}

.placeBtn{
  width:100%;
  margin-top:10px;
  background:#fc8019;
  padding:10px;
  border:none;
  border-radius:8px;
  color:white;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  <h1>🍽️ Dhawath Restaurant</h1>
</div>

<input id="table" class="tableInput" placeholder="Enter Table Number">

<div class="menu" id="menu"></div>

<div class="cartBox">
  <div id="cartItems"></div>
  <div class="total" id="total">Total: ₹0</div>
  <button class="placeBtn" onclick="placeOrder()">Place Order</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAUV8uk7hdxJKh75SlHukoohTtQ1Wd_qLk",
    authDomain: "dhawath-restaurant.firebaseapp.com",
    databaseURL: "https://dhawath-restaurant-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* MENU WITH ICONS */
const items = [
  {name:"Chicken Biryani",price:140,icon:"🍗"},
  {name:"Mutton Biryani",price:220,icon:"🥩"},
  {name:"Egg Biryani",price:80,icon:"🥚"},
  {name:"Veg Rice",price:60,icon:"🥗"},
  {name:"Chicken Noodles",price:90,icon:"🍜"},
  {name:"Chicken Manchuria",price:150,icon:"🍲"},
  {name:"Egg Curry",price:65,icon:"🍛"},
  {name:"Chicken Wings",price:100,icon:"🍗"},
  {name:"Paneer Masala",price:180,icon:"🧀"},
  {name:"Fish Fry",price:120,icon:"🐟"}
];

let cart = {};

/* LOAD MENU */
const menuDiv = document.getElementById("menu");

items.forEach((item,i)=>{
  menuDiv.innerHTML += `
  <div class="card">
    <div class="icon">${item.icon}</div>
    <h4>${item.name}</h4>
    <div class="price">₹${item.price}</div>
    
    <div class="qty">
      <button onclick="changeQty(${i},-1)">-</button>
      <span id="qty-${i}">0</span>
      <button onclick="changeQty(${i},1)">+</button>
    </div>
  </div>`;
});

function changeQty(i,change){
  if(!cart[i]) cart[i]={...items[i],qty:0};
  cart[i].qty += change;

  if(cart[i].qty <=0) delete cart[i];

  document.getElementById("qty-"+i).innerText = cart[i]?.qty || 0;
  updateCart();
}

/* UPDATE CART */
function updateCart(){
  let cartHTML="";
  let total=0;

  Object.values(cart).forEach(item=>{
    cartHTML += `<div class="cartItem">${item.name} x ${item.qty}</div>`;
    total += item.price * item.qty;
  });

  document.getElementById("cartItems").innerHTML = cartHTML || "Cart empty";
  document.getElementById("total").innerText = "Total: ₹"+total;
}

/* PLACE ORDER */
function placeOrder(){
  let table=document.getElementById("table").value;

  if(!table) return alert("Enter table number");

  let total=0;
  Object.values(cart).forEach(i=>{
    total+=i.price*i.qty;
  });

  db.ref("orders").push({
    table,
    items:cart,
    total,
    status:"pending",
    payment:"unpaid",
    time:new Date().toLocaleString()
  });

  alert("Order placed!");
  cart={};
  location.reload();
}
</script>

</body>
</html>
