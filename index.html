<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dhawath Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
}

.header h1{
  color:#fc8019;
}

/* TABLE INPUT */
.tableInput{
  width:90%;
  margin:10px auto;
  display:block;
  padding:12px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

/* MENU GRID */
.menu{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 4px 15px rgba(0,0,0,0.5);
}

.card h3{
  font-size:14px;
}

.price{
  color:#fc8019;
  margin:8px 0;
}

button{
  background:#4caf50;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

/* CART */
.cart{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1c1c1c;
  padding:15px;
}

.cart button{
  width:100%;
  background:#fc8019;
}
</style>
</head>

<body>

<div class="header">
  <h1>🍽️ Dhawath Restaurant</h1>
</div>

<input id="table" class="tableInput" placeholder="Enter Table Number">

<div class="menu" id="menu"></div>

<div class="cart">
  <button onclick="placeOrder()">Place Order</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAUV8uk7hdxJKh75SlHukoohTtQ1Wd_qLk",
    authDomain: "dhawath-restaurant.firebaseapp.com",
    databaseURL: "https://dhawath-restaurant-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* MENU DATA */
const items = [
  {name:"Chicken Biryani",price:140},
  {name:"Mutton Biryani",price:220},
  {name:"Family Biryani",price:520},

  {name:"Fry Piece Biryani",price:160},
  {name:"Paneer Biryani",price:160},
  {name:"Gongura Chicken Biryani",price:160},

  {name:"Egg Biryani",price:80},
  {name:"Chicken Rice",price:90},
  {name:"Egg Rice",price:70},
  {name:"Veg Rice",price:60},

  {name:"Jeera Rice",price:80},
  {name:"Egg Noodles",price:70},
  {name:"Chicken Noodles",price:90},
  {name:"Veg Noodles",price:60},

  {name:"Chicken Manchuria",price:150},
  {name:"Veg Manchuria",price:80},

  {name:"Egg Burji",price:100},
  {name:"Egg Curry",price:65},
  {name:"Egg Chilli",price:110},

  {name:"Egg Manchurian",price:100},
  {name:"Egg Keema",price:100},

  {name:"Chicken Wings (6 pcs)",price:100},
  {name:"Chicken Lollipop",price:150},

  {name:"Chicken Pakodi",price:150},
  {name:"Chicken Roast",price:160},
  {name:"Chicken 65",price:160},
  {name:"Chicken Chilli",price:160},

  {name:"Chicken Telangana Curry",price:160},
  {name:"Chicken Curry",price:150},

  {name:"Paneer Masala",price:180},
  {name:"Paneer Curry",price:160},

  {name:"Chapathi",price:10},
  {name:"Corn Fry",price:120},
  {name:"Fish Fry",price:120},

  {name:"Boti",price:150},
  {name:"Head Curry",price:180}
];

let cart = {};

/* LOAD MENU */
const menuDiv = document.getElementById("menu");

items.forEach((item,i)=>{
  menuDiv.innerHTML += `
  <div class="card">
    <h3>${item.name}</h3>
    <div class="price">₹${item.price}</div>
    <button onclick="addItem(${i})">ADD</button>
  </div>`;
});

function addItem(i){
  if(!cart[i]) cart[i]={...items[i],qty:0};
  cart[i].qty++;
}

/* PLACE ORDER */
function placeOrder(){

  let table = document.getElementById("table").value;
  if(!table) return alert("Enter table number");

  let total = 0;
  Object.values(cart).forEach(i=>{
    total += i.price * i.qty;
  });

  db.ref("orders").push({
    table,
    items:cart,
    total,
    status:"pending",
    payment:"unpaid",
    time:new Date().toLocaleString()
  });

  alert("Order placed!");
  cart={};
}
</script>

</body>
</html>
