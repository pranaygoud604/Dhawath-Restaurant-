<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhawath Restaurant</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
  text-align: center;
}

h1 {
  margin: 10px 0;
}

.container {
  padding: 10px;
}

input {
  width: 90%;
  padding: 12px;
  font-size: 16px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.item {
  background: #1c1c1c;
  padding: 15px;
  border-radius: 12px;
}

.qty-box {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
  margin-top: 10px;
}

.qty-box button {
  background: #f4b400;
  border: none;
  padding: 8px 12px;
  font-size: 18px;
  border-radius: 6px;
}

button.main {
  background: #f4b400;
  border: none;
  padding: 12px;
  margin: 5px;
  border-radius: 8px;
  font-size: 14px;
}
</style>
</head>

<body>

<h1>Dhawath Restaurant 🍽️</h1>
<p>Scan • Order • Pay</p>

<input type="number" id="table" placeholder="Enter Table Number">

<div class="container">
  <div class="grid">

    <div class="item">
      <h2>Chicken Biryani</h2>
      <p>₹180</p>
      <div class="qty-box">
        <button onclick="changeQty('chicken', -1)">➖</button>
        <span id="qty-chicken">0</span>
        <button onclick="changeQty('chicken', 1)">➕</button>
      </div>
    </div>

    <div class="item">
      <h2>Mutton Biryani</h2>
      <p>₹250</p>
      <div class="qty-box">
        <button onclick="changeQty('mutton', -1)">➖</button>
        <span id="qty-mutton">0</span>
        <button onclick="changeQty('mutton', 1)">➕</button>
      </div>
    </div>

    <div class="item">
      <h2>Noodles</h2>
      <p>₹120</p>
      <div class="qty-box">
        <button onclick="changeQty('noodles', -1)">➖</button>
        <span id="qty-noodles">0</span>
        <button onclick="changeQty('noodles', 1)">➕</button>
      </div>
    </div>

    <div class="item">
      <h2>Burger</h2>
      <p>₹100</p>
      <div class="qty-box">
        <button onclick="changeQty('burger', -1)">➖</button>
        <span id="qty-burger">0</span>
        <button onclick="changeQty('burger', 1)">➕</button>
      </div>
    </div>

    <div class="item">
      <h2>Cool Drinks</h2>
      <p>₹40</p>
      <div class="qty-box">
        <button onclick="changeQty('drinks', -1)">➖</button>
        <span id="qty-drinks">0</span>
        <button onclick="changeQty('drinks', 1)">➕</button>
      </div>
    </div>

  </div>
</div>

<h2>Total: <span id="total">₹0</span></h2>

<button class="main" onclick="payUPI()">💳 Pay via UPI</button>
<button class="main" onclick="sendWhatsApp()">📱 Send Order</button>
<button class="main" onclick="clearCart()">🧹 Clear</button>

<script>
let cart = {
  chicken: { name: "Chicken Biryani", price: 180, qty: 0 },
  mutton: { name: "Mutton Biryani", price: 250, qty: 0 },
  noodles: { name: "Noodles", price: 120, qty: 0 },
  burger: { name: "Burger", price: 100, qty: 0 },
  drinks: { name: "Cool Drinks", price: 40, qty: 0 }
};

function changeQty(item, change) {
  cart[item].qty += change;
  if (cart[item].qty < 0) cart[item].qty = 0;

  document.getElementById("qty-" + item).innerText = cart[item].qty;
  updateTotal();
}

function updateTotal() {
  let total = 0;
  for (let key in cart) {
    total += cart[key].price * cart[key].qty;
  }
  document.getElementById("total").innerText = "₹" + total;
}

function getOrderText() {
  let text = "";
  for (let key in cart) {
    if (cart[key].qty > 0) {
      text += cart[key].name + " x " + cart[key].qty + "%0A";
    }
  }
  return text;
}

function sendWhatsApp() {
  let table = document.getElementById("table").value;
  let order = getOrderText();

  if (!table || order === "") {
    alert("Enter table & select items");
    return;
  }

  let url = "https://wa.me/91XXXXXXXXXX?text=Table " + table + "%0A" + order;
  window.open(url, "_blank");
}

function payUPI() {
  let total = 0;
  for (let key in cart) {
    total += cart[key].price * cart[key].qty;
  }

  if (total === 0) {
    alert("Add items first");
    return;
  }

  let upi = "upi://pay?pa=yourupi@upi&pn=DhawathRestaurant&am=" + total + "&cu=INR";
  window.location.href = upi;
}

function clearCart() {
  for (let key in cart) {
    cart[key].qty = 0;
    document.getElementById("qty-" + key).innerText = 0;
  }
  updateTotal();
}
</script>

</body>
</html>
