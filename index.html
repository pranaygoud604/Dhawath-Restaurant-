<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhawath Restaurant</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BACKGROUND */
body {
  font-family: 'Segoe UI', sans-serif;
  background: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092') no-repeat center/cover;
  color: white;
}

/* OVERLAY */
.overlay {
  background: rgba(0,0,0,0.75);
  min-height: 100vh;
  padding: 20px;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 20px;
}

.header h1 {
  font-size: 32px;
}

.subtitle {
  color: #f4b400;
  letter-spacing: 3px;
}

/* TABLE INPUT */
input {
  width: 300px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 15px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 30px;
}

/* CARD */
.item {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 25px rgba(0,0,0,0.5);
  transition: 0.3s;
}

.item:hover {
  transform: scale(1.05);
}

/* ICON */
.item img {
  width: 40px;
  margin-bottom: 10px;
}

/* TITLE */
.item h3 {
  margin-bottom: 5px;
}

/* PRICE */
.price {
  color: #f4b400;
  font-weight: bold;
}

/* BUTTON */
.item button {
  margin-top: 10px;
  background: linear-gradient(90deg, #f4b400, #ffcc33);
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

/* ORDER SECTION */
.order-box {
  margin-top: 30px;
  text-align: center;
}

.total {
  margin-top: 10px;
  font-size: 20px;
}

/* MOBILE */
@media (max-width: 768px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<div class="overlay">

<div class="header">
<h1>Dhawath Restaurant</h1>
<div class="subtitle">SCAN • ORDER • PAY</div>

<input type="number" id="table" placeholder="Enter Table Number">
</div>

<div class="grid">

<div class="item">
<h3>Chicken Biryani</h3>
<div class="price">₹180</div>
<button onclick="changeQty('biryani',1)">Add to Order</button>
</div>

<div class="item">
<h3>Mutton Biryani</h3>
<div class="price">₹250</div>
<button onclick="changeQty('mutton',1)">Add to Order</button>
</div>

<div class="item">
<h3>Noodles</h3>
<div class="price">₹120</div>
<button onclick="changeQty('noodles',1)">Add to Order</button>
</div>

<div class="item">
<h3>Burger</h3>
<div class="price">₹100</div>
<button onclick="changeQty('burger',1)">Add to Order</button>
</div>

<div class="item">
<h3>Fried Rice</h3>
<div class="price">₹140</div>
<button onclick="changeQty('rice',1)">Add to Order</button>
</div>

<div class="item">
<h3>Shawarma</h3>
<div class="price">₹130</div>
<button onclick="changeQty('shawarma',1)">Add to Order</button>
</div>

</div>

<div class="order-box">
<h3>Your Order</h3>
<div id="orderList">Your cart is empty</div>

<div class="total">
Total: ₹<span id="total">0</span>
</div>

<button onclick="sendWhatsApp()">📱 Place Order</button>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="script.js"></script>

</body>
</html>
