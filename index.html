<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhawath Restaurant</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
  color: #fff;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
  color: #ff8c00;
}

/* CONTAINER */
.container {
  padding: 15px;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-bottom: 12px;
  background: #222;
  color: #fff;
  font-size: 15px;
}

/* SECTION */
.section-title {
  margin: 15px 0;
  font-size: 18px;
  color: #ff8c00;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 15px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

/* PRICE */
.price {
  color: #ff8c00;
  margin: 5px 0;
  font-weight: bold;
}

/* QTY */
.qty {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

.qty button {
  background: #ff8c00;
  border: none;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 16px;
  color: #000;
  font-weight: bold;
}

/* CART */
.cart {
  margin-top: 15px;
  padding: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
}

.cart-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: linear-gradient(90deg, #ff8c00, #ff5e00);
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.total {
  font-size: 18px;
  font-weight: bold;
}

.order-btn {
  background: #000;
  color: #ff8c00;
  border: none;
  padding: 10px 16px;
  border-radius: 12px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">🍽️ Dhawath Restaurant</div>

<div class="container">

<input id="table" placeholder="Enter Table Number">
<input id="search" placeholder="🔍 Search items..." onkeyup="searchItems()">

<div class="section-title">Biryani</div>

<div class="grid">

<div class="card">
  <h4>Chicken Biryani</h4>
  <div class="price">₹140</div>
  <div class="qty">
    <button onclick="updateQty('Chicken Biryani',140,-1)">-</button>
    <span id="Chicken Biryani">0</span>
    <button onclick="updateQty('Chicken Biryani',140,1)">+</button>
  </div>
</div>

<div class="card">
  <h4>Mutton Biryani</h4>
  <div class="price">₹220</div>
  <div class="qty">
    <button onclick="updateQty('Mutton Biryani',220,-1)">-</button>
    <span id="Mutton Biryani">0</span>
    <button onclick="updateQty('Mutton Biryani',220,1)">+</button>
  </div>
</div>

<div class="card">
  <h4>Chicken 65</h4>
  <div class="price">₹180</div>
  <div class="qty">
    <button onclick="updateQty('Chicken 65',180,-1)">-</button>
    <span id="Chicken 65">0</span>
    <button onclick="updateQty('Chicken 65',180,1)">+</button>
  </div>
</div>

<div class="card">
  <h4>Cool Drink</h4>
  <div class="price">₹40</div>
  <div class="qty">
    <button onclick="updateQty('Cool Drink',40,-1)">-</button>
    <span id="Cool Drink">0</span>
    <button onclick="updateQty('Cool Drink',40,1)">+</button>
  </div>
</div>

</div>

<div class="cart">
  <h3>Cart</h3>
  <div id="cartItems"></div>
</div>

</div>

<div class="footer">
  <div class="total" id="total">₹0</div>
  <button class="order-btn" onclick="placeOrder()">Place Order</button>
</div>

<script>
let cart = {};

function updateQty(name, price, change) {
  if (!cart[name]) cart[name] = { qty: 0, price };

  cart[name].qty += change;
  if (cart[name].qty <= 0) delete cart[name];

  document.getElementById(name).innerText = cart[name]?.qty || 0;
  renderCart();
}

function renderCart() {
  let total = 0;
  let html = "";

  Object.keys(cart).forEach(name => {
    let item = cart[name];
    let subtotal = item.qty * item.price;
    total += subtotal;

    html += `
      <div class="cart-item">
        <div>${name} x ${item.qty}</div>
        <div>₹${subtotal}</div>
      </div>
    `;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = "₹" + total;
}

function searchItems() {
  let input = document.getElementById("search").value.toLowerCase();
  document.querySelectorAll(".card").forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(input) ? "block" : "none";
  });
}

function placeOrder() {
  let table = document.getElementById("table").value;
  if (!table) return alert("Enter table number");
  if (Object.keys(cart).length === 0) return alert("Cart empty");

  alert("Order placed for Table " + table);
}
</script>

</body>
</html>
