<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhawath Restaurant</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0d0d0d;
  color: #fff;
}

.header {
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
  color: #ff7a00;
}

.search {
  padding: 10px 20px;
}
.search input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #1c1c1c;
  color: white;
}

.section-title {
  padding: 10px 20px;
  color: #ff7a00;
  font-weight: bold;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 0 20px 100px;
}

.card {
  background: #1a1a1a;
  border-radius: 15px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 110px;
  object-fit: cover;
}

.content {
  padding: 10px;
}

.title {
  font-size: 14px;
  font-weight: bold;
}

.price {
  color: #ff7a00;
  font-weight: bold;
}

.qty {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
}

.qty button {
  background: #ff7a00;
  border: none;
  padding: 5px 10px;
  border-radius: 8px;
}

.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #ff7a00;
  display: flex;
  justify-content: space-between;
  padding: 15px;
  color: #000;
  font-weight: bold;
}

.order {
  background: black;
  color: orange;
  border: none;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">🍽️ Dhawath Restaurant</div>

<div class="search">
  <input id="search" placeholder="Search food..." onkeyup="searchItems()">
</div>

<div id="menu"></div>

<div class="footer">
  <div id="total">₹0</div>
  <button class="order" onclick="placeOrder()">Place Order</button>
</div>

<script>
const items = [
["Chicken Biryani Single",140],["Chicken Biryani Double",220],["Chicken Biryani Family",520],
["Fry Piece Biryani Single",160],["Fry Piece Biryani Double",240],["Fry Piece Biryani Family",540],
["Paneer Biryani Single",160],["Paneer Biryani Double",240],["Paneer Biryani Family",540],
["Gongura Chicken Biryani Single",160],["Gongura Chicken Biryani Double",240],["Gongura Chicken Biryani Family",540],
["Egg Biryani",80],
["Chicken Rice",90],["Egg Rice",70],["Veg Rice",60],["Jeera Rice",80],
["Egg Noodles",70],["Chicken Noodles",90],["Veg Noodles",60],
["Chicken Manchuria",150],["Veg Manchuria",80],
["Egg Burji",100],["Egg 65",110],["Egg Chilli",110],["Egg Manchurian",100],["Egg Keema",100],
["Chicken Wings (6 pcs)",100],["Chicken Lollipop",150],
["Chicken Pakodi Full",150],["Chicken Pakodi Single",100],
["Chicken Roast Full",160],["Chicken Roast Single",100],
["Chicken 65 Full",160],["Chicken 65 Single",100],
["Chicken Chilli Full",160],["Chicken Chilli Single",100],
["Chicken Telangana Curry",160],["Chicken Curry",150],
["Paneer Masala",180],["Paneer Curry",160],
["Chapathi",10],["Corn Fry",120],["Fish Fry",120],["Boti",150],["Head",180]
];

let cart = {};

function renderMenu() {
  let html = '<div class="grid">';
  items.forEach(([name, price]) => {
    html += `
    <div class="card">
      <img src="https://source.unsplash.com/300x200/?food">
      <div class="content">
        <div class="title">${name}</div>
        <div class="price">₹${price}</div>
        <div class="qty">
          <button onclick="updateQty('${name}',${price},-1)">-</button>
          <span id="${name}">0</span>
          <button onclick="updateQty('${name}',${price},1)">+</button>
        </div>
      </div>
    </div>`;
  });
  html += "</div>";
  document.getElementById("menu").innerHTML = html;
}

function updateQty(name, price, change) {
  if (!cart[name]) cart[name] = { qty: 0, price };
  cart[name].qty += change;
  if (cart[name].qty <= 0) delete cart[name];
  document.getElementById(name).innerText = cart[name]?.qty || 0;
  renderTotal();
}

function renderTotal() {
  let total = 0;
  Object.values(cart).forEach(i => total += i.qty * i.price);
  document.getElementById("total").innerText = "₹" + total;
}

function searchItems() {
  let input = document.getElementById("search").value.toLowerCase();
  document.querySelectorAll(".card").forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(input) ? "block" : "none";
  });
}

// 🔥 PLACE ORDER WITH FIREBASE
function placeOrder() {
  let table = prompt("Enter Table Number");
  if (!table) return alert("Enter table number");
  if (Object.keys(cart).length === 0) return alert("Cart empty");

  db.collection("orders").add({
    table: table,
    items: cart,
    total: document.getElementById("total").innerText,
    status: "new",
    time: new Date()
  })
  .then(() => {
    alert("✅ Order placed!");
    cart = {};
    renderTotal();
    document.querySelectorAll("span").forEach(s => s.innerText = "0");
  })
  .catch(err => {
    alert("Error!");
    console.error(err);
  });
}

renderMenu();
</script>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    authDomain: "dhawath-restaurant.firebaseapp.com",
    databaseURL: "https://dhawath-restaurant-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

</body>
</html>
