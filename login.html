<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dhawath Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* CARD */
.login-box{
  background:#1e1e1e;
  padding:30px 25px;
  border-radius:16px;
  width:320px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* TITLE */
.logo{
  font-size:22px;
  font-weight:600;
  color:#fc8019;
  margin-bottom:5px;
}

.subtitle{
  font-size:12px;
  color:#aaa;
  margin-bottom:20px;
}

/* INPUT */
.input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:none;
  border-radius:8px;
  background:#2a2a2a;
  color:white;
  font-size:14px;
}

/* BUTTON */
.loginBtn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#fc8019;
  color:white;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.loginBtn:hover{
  background:#e76f00;
}

/* FOOTER */
.footer{
  margin-top:15px;
  font-size:11px;
  color:#777;
}
</style>

</head>

<body>

<div class="login-box">

  <div class="logo">🍽️ Dhawath</div>
  <div class="subtitle">Restaurant Admin Login</div>

  <input type="email" id="email" class="input" placeholder="Enter Email">
  <input type="password" id="password" class="input" placeholder="Enter Password">

  <button class="loginBtn" onclick="login()">Login</button>

  <div class="footer">Powered by Dhawath POS</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAUV8uk7hdxJKh75SlHukoohTtQ1Wd_qLk",
    authDomain: "dhawath-restaurant.firebaseapp.com",
    databaseURL: "https://dhawath-restaurant-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, pass)
    .then(()=>{
      window.location.href = "admin.html";
    })
    .catch(()=>{
      alert("Invalid login ❌");
    });
}
</script>

</body>
</html>
